[colors]
background = #1e1e2e
background-alt = #45465a
foreground = #cdd6f4
primary = #89dceb
secondary = #a6e3a1
alert = #f38ba8
disabled = #a6adc8

[bar/example]
width = 100%
height = 18pt
radius = 4

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 6px
border-bottom-size = 0
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

# separator = ÔĎĄ
# separator-foreground = ${colors.disabled}

font-0 = JetBrainsMono Nerd Font:size=10.5:weight=bold;2
font-1 = Montserrat:size=10:weight=medium;3

modules-left = xworkspaces xwindow
modules-center = date
modules-right = wlan eth pulseaudio memory cpu powermenu

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; tray-position = center

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
# label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "Ô©Ĺ "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = ÔĪĚ
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "Ô•¨ "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "Ô¨ô "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#F0C674}%{F-} %downspeed%%{A}
interval = 1.0
accumulate-stats = true
unknown-as-up = true
format-connected = <ramp-signal> <label-connected>
format-connected-background = ${colors.background}
format-disconnected = <label-disconnected>
format-disconnected-prefix = " ÔĀ™ "
format-disconnected-prefix-font = 2
format-disconnected-foreground = ${colors.background-alt}
format-disconnected-background = ${colors.background} 
label-disconnected = %{ifname%%essid% }
; Only applies if <ramp-signal> is used
ramp-signal-0 = Ôáę
ramp-signal-1 = Ôáę
ramp-signal-2 = Ôáę
ramp-signal-3 = Ôáę
ramp-signal-4 = Ôáę
ramp-signal-foreground = ${colors.primary}
ramp-signal-font = 2

[module/eth]
inherit = network-base
interface-type = wired
label-connected = ÔõŅ 
format-padding-right = 13px

[module/date]
type = internal/date
interval = 1

date = %a %b %d %I:%M %p
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.primary}
label-font = 2

[module/powermenu]
type = custom/menu


label-open = "ÔÄĎ"
label-open-font = 4
label-close = "ÔĀě"
label-close-foreground = ${colors.primary}
label-separator = " - "


; reboot
menu-0-1 = ÔÄ°
menu-0-1-exec = systemctl reboot
menu-0-1-foreground = ${colors.alert}
; shutdown
menu-0-0 = ÔÄĎ
menu-0-0-exec = systemctl poweroff
menu-0-0-foreground = ${colors.alert}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
